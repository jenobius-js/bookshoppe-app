{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookShoppe | Sign_In</title>
    <link rel="stylesheet" href="{% static 'BookShoppe/style.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="navbar" style="background-color:black ;">
        <div class="logo">
            <a href="/index"><h3>Book<span>Shoppe</span></h3></a>
        </div>
        <div class="menu">
            <a href="/index">Home</a>
            <a href="/book_list">Books</a>
            <a href="/cart"><i class='bx bx-cart-alt'></i>Cart</a>
        </div>
    </div>
    <h3 class="title">Sign In</h3>
    <div class="container">
        
            <div class="row">
                <div class="col-2"> 
                    <form method="post" action="">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="text" name="username" id="username" class="form-control" placeholder="Username">
                        </div>
                        <div class="mb-4">
                            <input type="password" name="password" id="password" class="form-control" placeholder="Password">
                        </div> 
                            <button type="submit" class="btn" style="border: none; margin-left: 40px;">Login</button>
                    </form>
                        <p class="my-2" style="text-align: center;">New User? <a href="/sign_up" style="color: aqua;">Register</a></p>
                </div>
            </div>
    </div>

        <div class="footer">
            <p>&copy; 2023 BookShoppe. All rights reserved.</p>
        </div>
    </body>
    
    </html>
