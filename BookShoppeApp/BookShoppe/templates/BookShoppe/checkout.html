{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookShoppe | Checkout</title>
    <link rel="stylesheet" href="{% static 'BookShoppe/style.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
</head>
<body>
    <div class="navbar" style="background-color:black ;">
        <div class="logo">
            <a href="/index"><h3>Book<span>Shoppe</span></h3></a>
        </div>
        <div class="menu">
            <a href="/index">Home</a>
            <a href="/book_list">Books</a>
            <a href="/cart"><i class='bx bx-cart-alt'></i>Cart</a>
        </div>
        <div class="signup">
            {% if request.user.is_authenticated %}
                <a href=""><i class='bx bx-user'></i> {{request.user}}</a>
                <a href="/logout_page" style="padding-left: 10px;"><i class='bx bx-log-out'></i></a>
            {% else %}
                <a href="/sign_up"><i class='bx bx-user'></i> Sign Up</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        <h3 class="title">Checkout</h3>
        <div class="checkout">
        <form method="post" action="/place_order/">
            {% csrf_token %}
            <label for="shipping_address">Shipping Address:</label><br>
            <input type="text" id="shipping_address" name="shipping_address" required><br>
            <button type="submit" class="btn" id="btnCart" style="border: none; margin-left: 40px;">Place Order</button>

        </form>
    </div>
    </div>


    <div class="footer">
        <p>&copy; 2023 BookShoppe. All rights reserved.</p>
    </div>

    <script>
        document.getElementById("btnCart").addEventListener("click", function(event) {
            var shippingAddress = document.getElementById("shipping_address").value;
            if (shippingAddress.trim() === "") {
                event.preventDefault();
                alert("Please enter a valid shipping address.");
                return false;
            }
        });
        </script>
        

</body>
</html>
